<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – NEU Library</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--dark) url('lib.jpg') no-repeat center center fixed;
      background-size: cover;
      background-attachment: fixed;
      color: white;
      font-family: 'Roboto', sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,31,68,0.88), rgba(15,23,42,0.96));
      z-index: -1;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 15px 60px;
    }

    header {
      background: rgba(10,31,68,0.92);
      backdrop-filter: blur(12px);
      padding: 1.2rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(212,175,55,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .logo-container img {
      height: 60px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.9rem;
      margin: 0;
    }

    .user-info button {
      margin-left: 12px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      text-align: center;
      margin: 40px 0 30px;
      font-size: 2.4rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin: 30px 0;
      padding: 24px;
      background: rgba(15,23,42,0.75);
      border-radius: 16px;
      border: 1px solid rgba(212,175,55,0.3);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .filter-item {
      min-width: 190px;
      display: flex;
      flex-direction: column;
    }

    .filter-item label {
      margin-bottom: 8px;
      color: var(--gold-light);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .filter-item select,
    .filter-item input[type="date"] {
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(212,175,55,0.45);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .filter-item select:hover,
    .filter-item input[type="date"]:hover {
      border-color: var(--gold);
      background: rgba(255,255,255,0.12);
    }

    .filter-item select:focus,
    .filter-item input[type="date"]:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.25);
    }

    #applyFilters {
      align-self: flex-end;
      margin-top: 28px;
      padding: 13px 32px;
      font-size: 1.05rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin: 50px 0;
    }

    .stat-card {
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(212,175,55,0.3);
    }

    .stat-card h4 {
      margin: 0 0 12px;
      color: var(--gold-light);
      font-size: 1.15rem;
      font-weight: 500;
    }

    .stat-card .value {
      font-size: 3.2rem;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 40px;
      background: rgba(15,23,42,0.7);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    th, td {
      padding: 16px;
      border-bottom: 1px solid rgba(212,175,55,0.2);
      text-align: left;
    }

    th {
      background: rgba(212,175,55,0.18);
      color: var(--gold);
      font-weight: 600;
    }

    td {
      color: white;
    }

    @media (max-width: 768px) {
      .filter-row {
        flex-direction: column;
        align-items: center;
      }
      .filter-item {
        width: 100%;
        max-width: 340px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="neulogo.png" alt="NEU Logo">
      <h1>NEU Library – Admin Dashboard</h1>
    </div>
    <div class="user-info">
      <button class="signout-btn" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="container">
    <h2>Visitor Statistics & Live Logs</h2>

    <div id="loading" style="text-align:center; margin:100px 0; color:var(--gold); font-size:1.4rem;">
      Loading dashboard...
    </div>

    <div id="dashboardContent" style="display:none;">

      <!-- FILTERS -->
      <div class="filter-row">
        <div class="filter-item">
          <label>Time Period</label>
          <select id="period">
            <option value="today">Today</option>
            <option value="week">This Week</option>
            <option value="custom">Custom Range</option>
          </select>
        </div>

        <div class="filter-item custom-range" style="display:none;">
          <label>Start Date</label>
          <input type="date" id="startDate">
        </div>

        <div class="filter-item custom-range" style="display:none;">
          <label>End Date</label>
          <input type="date" id="endDate">
        </div>

        <div class="filter-item">
          <label>Purpose</label>
          <select id="purposeFilter">
            <option value="">All Purposes</option>
            <option value="Reading Books">Reading Books</option>
            <option value="Research / Thesis">Research / Thesis</option>
            <option value="Borrowing Books">Borrowing Books</option>
            <option value="Using Computer">Using Computer</option>
            <option value="Doing Assignments">Doing Assignments</option>
          </select>
        </div>

        <div class="filter-item">
          <label>College</label>
          <select id="collegeFilter">
            <option value="">All Colleges</option>
            <option value="College of Computer Studies">College of Computer Studies</option>
            <option value="College of Engineering">College of Engineering</option>
            <option value="College of Nursing">College of Nursing</option>
          </select>
        </div>

        <div class="filter-item">
          <label>Employee</label>
          <select id="employeeFilter">
            <option value="">All</option>
            <option value="yes">Employees Only</option>
            <option value="no">Students Only</option>
          </select>
        </div>

        <button id="applyFilters" class="primary-btn" style="margin-top:28px; padding:13px 32px;">
          Apply Filters
        </button>
      </div>

      <!-- STATISTICS CARDS -->
      <div class="stats-grid">
        <div class="stat-card">
          <h4>Total Visitors</h4>
          <div id="totalVisitors" class="value">0</div>
        </div>
        <div class="stat-card">
          <h4>Unique Visitors</h4>
          <div id="uniqueVisitors" class="value">0</div>
        </div>
      </div>

      <!-- VISITOR TABLE -->
      <h3 style="color:var(--gold); margin:50px 0 15px; text-align:center;">
        Visitor Records
      </h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>School ID</th>
            <th>College</th>
            <th>Purpose</th>
            <th>Time</th>
            <th>Employee</th>
          </tr>
        </thead>
        <tbody id="visitorTableBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { supabase, logout } from './auth.js';
    window.logout = logout;

    async function checkAdmin() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return window.location.href = './index.html';

      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', user.id)
        .single();

      if (profile?.role !== 'admin') {
        alert('Admin access only');
        window.location.href = './checkin.html';
        return;
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboardContent').style.display = 'block';

      loadData();
    }

    async function loadData() {
      const period = document.getElementById('period').value;
      let startDate, endDate = new Date().toISOString();

      const now = new Date();

      if (period === 'today') {
        startDate = new Date(now.setHours(0,0,0,0)).toISOString();
      } else if (period === 'week') {
        const d = new Date(now);
        d.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
        startDate = d.toISOString();
      } else if (period === 'custom') {
        startDate = document.getElementById('startDate').value 
          ? new Date(document.getElementById('startDate').value).toISOString() 
          : null;
        endDate = document.getElementById('endDate').value 
          ? new Date(document.getElementById('endDate').value).toISOString() 
          : endDate;
      }

      let query = supabase
        .from('visits')
        .select('*, profiles(first_name, last_name, school_id, college, is_employee)')
        .gte('visit_time', startDate || '1970-01-01')
        .lte('visit_time', endDate || '3000-01-01')
        .order('visit_time', { ascending: false });

      const purpose = document.getElementById('purposeFilter').value;
      if (purpose) query = query.eq('purpose', purpose);

      const college = document.getElementById('collegeFilter').value;
      if (college) query = query.eq('college', college);

      const employee = document.getElementById('employeeFilter').value;
      if (employee === 'yes') query = query.eq('profiles.is_employee', true);
      if (employee === 'no') query = query.eq('profiles.is_employee', false);

      const { data, error } = await query;

      if (error) {
        console.error('Error loading data:', error);
        alert('Error loading data: ' + error.message);
        return;
      }

      document.getElementById('totalVisitors').textContent = data.length;
      document.getElementById('uniqueVisitors').textContent = new Set(data.map(v => v.user_id)).size;

      const tbody = document.getElementById('visitorTableBody');
      tbody.innerHTML = data.map(v => `
        <tr>
          <td>${v.profiles.first_name} ${v.profiles.last_name}</td>
          <td>${v.profiles.school_id || '—'}</td>
          <td>${v.college}</td>
          <td>${v.purpose}</td>
          <td>${new Date(v.visit_time).toLocaleString('en-PH')}</td>
          <td>${v.profiles.is_employee ? 'Yes' : 'No'}</td>
        </tr>
      `).join('');
    }

    // Show/hide custom date fields
    document.getElementById('period').addEventListener('change', e => {
      const custom = document.querySelectorAll('#startDate, #endDate');
      custom.forEach(el => el.style.display = e.target.value === 'custom' ? 'block' : 'none');
    });

    // Apply filters
    document.getElementById('applyFilters').addEventListener('click', loadData);

    // Initial load
    checkAdmin();
  </script>

</body>
</html>
